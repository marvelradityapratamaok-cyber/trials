<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Loading — Admin Laundry</title>
    <link rel="icon" href="logo.jpeg" />
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: #ffffff;
            color: #0f172a;
        }
        body.dark {
            background: #000000;
            color: #ffffff;
        }

        /* ===== SPLASH SCREEN ===== */
        #splash-screen {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: var(--bg-base, #ffffff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease;
        }
        body.dark #splash-screen {
            --bg-base: #000000;
        }
        #splash-screen .logo {
            font-size: 3rem;
            font-weight: 900;
            color: var(--text-main, #0f172a);
        }
        body.dark #splash-screen .logo {
            color: #ffffff;
        }
        #splash-screen .logo span {
            color: #2563eb;
        }
        #splash-screen .loader {
            margin-top: 2rem;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(0, 0, 0, 0.08);
            border-top: 5px solid #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        body.dark #splash-screen .loader {
            border-color: rgba(255, 255, 255, 0.08);
            border-top-color: #60a5fa;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        #splash-screen .status {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            min-height: 2rem;
            text-align: center;
        }
        body.dark #splash-screen .status {
            color: #a1a1aa;
        }
        #splash-screen .progress-track {
            width: 220px;
            height: 6px;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 99px;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        body.dark #splash-screen .progress-track {
            background: rgba(255, 255, 255, 0.08);
        }
        #splash-screen .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2563eb, #60a5fa);
            border-radius: 99px;
            transition: width 0.15s linear;
        }
        #splash-screen.hide {
            opacity: 0;
            pointer-events: none;
        }

        /* ===== TOMBOL REDIRECT (opsional) ===== */
        .btn-redirect {
            margin-top: 1.5rem;
            padding: 0.75rem 2rem;
            border-radius: 2rem;
            background: #2563eb;
            color: #fff;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(37, 99, 235, 0.3);
        }
        .btn-redirect:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 24px rgba(37, 99, 235, 0.4);
        }
        .btn-redirect:active {
            transform: scale(0.96);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            #splash-screen .logo {
                font-size: 2.2rem;
            }
            #splash-screen .loader {
                width: 40px;
                height: 40px;
                border-width: 4px;
            }
            #splash-screen .status {
                font-size: 0.75rem;
            }
            #splash-screen .progress-track {
                width: 180px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== SPLASH SCREEN ===== -->
    <div id="splash-screen">
        <div class="logo">Admin<span>Laundry.</span></div>
        <div class="loader"></div>
        <div class="status" id="splash-status">⏳ Menyiapkan sistem...</div>
        <div class="progress-track">
            <div class="progress-fill" id="splash-progress"></div>
        </div>

        <!-- tombol ini muncul setelah loading selesai (opsional) -->
        <button class="btn-redirect" id="btn-redirect" style="display:none;" onclick="lanjutKeHalaman()">
            🚀 Lanjut ke Halaman Utama
        </button>
    </div>

    <script>
        // ================================================================
        // KONFIGURASI
        // ================================================================

        // Ganti URL di bawah dengan file tujuan Anda.
        // Contoh: "index.html", "dashboard.html", "app.html", dll.
        const TARGET_URL = "index1.html";

        // Durasi loading (dalam milidetik). 4000 = 4 detik.
        const LOADING_DURATION = 4000;

        // Apakah ingin redirect otomatis setelah loading selesai?
        // true  = otomatis pindah ke TARGET_URL
        // false = muncul tombol untuk lanjut
        const AUTO_REDIRECT = true;

        // ================================================================
        // SPLASH PROGRESS
        // ================================================================

        let splashProgress = 0;
        const splashStatus = document.getElementById('splash-status');
        const splashProgressBar = document.getElementById('splash-progress');
        const splashScreen = document.getElementById('splash-screen');
        const btnRedirect = document.getElementById('btn-redirect');

        // Pesan-pesan yang muncul selama loading
        const messages = [
            '⏳ Menyiapkan sistem...',
            '🔄 Menghubungkan database...',
            '📦 Memuat data...',
            '🔐 Verifikasi keamanan...',
            '📊 Menyiapkan dashboard...',
            '✅ Siap digunakan!'
        ];

        function updateSplash() {
            if (splashProgress >= 100) {
                splashProgressBar.style.width = '100%';
                splashStatus.textContent = '✅ Selesai!';

                // Tampilkan tombol jika AUTO_REDIRECT = false
                if (!AUTO_REDIRECT) {
                    btnRedirect.style.display = 'inline-block';
                }

                // Jika auto redirect, langsung pindah setelah jeda singkat
                if (AUTO_REDIRECT) {
                    setTimeout(() => {
                        lanjutKeHalaman();
                    }, 600);
                }
                return;
            }

            splashProgress++;
            splashProgressBar.style.width = splashProgress + '%';

            // Update teks status berdasarkan progress
            const idx = Math.min(Math.floor(splashProgress / (100 / messages.length)), messages.length - 1);
            splashStatus.textContent = messages[idx] || messages[messages.length - 1];

            // Kecepatan progress: 100% dalam LOADING_DURATION ms
            const stepDuration = LOADING_DURATION / 100;
            setTimeout(updateSplash, stepDuration);
        }

        function lanjutKeHalaman() {
            // Sembunyikan splash dengan efek fade
            splashScreen.classList.add('hide');

            // Redirect ke halaman tujuan
            setTimeout(() => {
                window.location.href = TARGET_URL;
            }, 400);
        }

        // ================================================================
        // DETEKSI DARK MODE (otomatis dari sistem)
        // ================================================================

        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.body.classList.add('dark');
        }

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (e.matches) {
                document.body.classList.add('dark');
            } else {
                document.body.classList.remove('dark');
            }
        });

        // ================================================================
        // JALANKAN SPLASH
        // ================================================================

        // Mulai progress bar
        updateSplash();

        // ================================================================
        // KEYBOARD SHORTCUT (opsional)
        // ================================================================

        // Tekan tombol "Enter" atau "Space" untuk lanjut (jika tombol terlihat)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                if (btnRedirect.style.display !== 'none' && btnRedirect.style.display !== '') {
                    lanjutKeHalaman();
                }
            }
        });

        // ================================================================
        // EXPOSE (agar bisa dipanggil dari console jika diperlukan)
        // ================================================================

        window.lanjutKeHalaman = lanjutKeHalaman;
    </script>

</body>
</html>
